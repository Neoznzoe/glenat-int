server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Endpoint de healthcheck (séparé de version.json — sert juste à vérifier que Nginx est up)
  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    add_header Cache-Control "no-store";
    return 200 "OK\n";
  }

  # SPA fallback pour React Router
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Assets immutables (Vite hash dans le nom — chemin /public/assets/ vu la config Vite custom)
  location /public/assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # version.json toujours frais (utilisé par les healthchecks et le front)
  location = /version.json {
    add_header Cache-Control "no-store";
  }

  # index.html jamais en cache (pour récupérer les nouveaux hashs)
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
